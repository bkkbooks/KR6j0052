body:
  text: 西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫沙門臣施護等奉詔譯爾時金剛手菩薩摩訶薩復白世尊大毗盧遮那如來言世尊云何是金剛杵復云何是蓮華爾時世尊大毗盧遮那如來告金剛手菩薩摩訶薩言金剛手一切如來安住之智即金剛杵本部賢聖和合相應是謂蓮華而彼金剛杵住於蓮華上由是出生一切如來彼諸如來身即毗盧遮那如是作已然後乃從金剛語言安布大明祕密文字所謂勃𭍌二合引其字先於自心淨月曼拏羅中想安住已然後想成大妙高山於其山上想現是字其字復成金剛寶峯廣大樓閣大摩尼寶所共莊嚴懸鈴珠寶繒幡瓔珞微風吹動出和雅音如是種種殊妙校飾吉祥勝上堪所稱讚而彼樓閣一切如來所共安住於樓閣中復想五股金剛杵輪廣略相應即想其杵復成金剛薩埵大士影像勝相具足身如月色現光明而復安處月輪之上頂戴五佛殊妙寶冠金剛相光焰鬘莊嚴左右皆現高舉之相安住諸法本來無性大三昧邪真實理中若情若器諸性自性以是二種合為一相是故觀想己身成就金剛薩埵如是觀已即此本尊等諸法用然後施作爾時金剛手菩薩摩訶薩復於世尊大毗盧遮那如來前月曼拏羅中依止而住作是白言世尊云何是本尊爾時世尊大毗盧遮那如來為金剛手菩薩摩訶薩次第宣説本尊等法諸修瑜伽行者先當依法於自心月曼拏羅中觀想吽字從是文字想出普門巧業衆相大金剛杵作是觀時當結密印其印先作金剛縛後散開諸指作攝入勢成印誦此本心大明曰嚩日囉二合滿馱怛囉二合吒一句誦是大明結是印已然後乃可結一切印及作本尊等法乃至金剛阿吠舍并鉤召等餘諸成就法從自身語心金剛加持作用即得敬愛成就然後乃結金剛阿吠舍印誦彼心明其明所謂惡入由是心明普遍攝入本尊等法乃至諸餘成就之法悉得善友敬愛而住其金剛阿吠舍印者先作金剛掌次作金剛縛後結金剛阿吠舍印金剛掌者堅實掌心諸指不縛而復緊密成金剛掌即轉此掌善結其縛成金剛縛復開此縛作金剛拳二頭相並即成金剛阿吠舍三昧邪印然後從自心中安想金剛薩埵文字之相復想其字即成五股白色淨妙周匝光焰大金剛杵復次如前依法安想祕密文字然後乃結薩埵金剛印當結印時先當誦是心大明曰唵引三摩邪薩怛網三合一句其薩埵金剛印者謂以二手作圓月相二中指相離餘指面相著如金剛杵相成印結是印時誦此大明曰唵引底瑟姹二合嚩日囉二合捺哩二合除引彌引婆嚩一句蘇覩引沙踰二合引彌引婆嚩二阿努囉訖覩二合引彌引婆嚩三舍引説覩引彌引婆嚩四蘇布引沙踰二合引彌引婆嚩五紇哩二合捺煬彌引提底瑟吒二合六薩哩嚩二合悉提孕二合彌引鉢囉二合野蹉七薩哩嚩二合羯哩彌二合引數左八爾唧多室哩二合引野俱嚕吽引九訶訶訶訶呼引十如是大明即本尊法此中具有四禮敬印所謂心印誓誡心印大乘現前三昧心印妙金剛智天眼智等五通心印是諸印門總攝如來堅固之性金剛加持離諸怖畏能成一切最上成就所有一切適悅快樂諸正受等一切總持門等乃至一切如來真實性等總攝自心悉得安住金剛加持身語心業然後取以繒帛而為其鬘安自頂上誦此心明曰鉢囉二合帝引蹉嚩日囉二合呼引一句誦是心明而加持已即於頂上作繫鬘相旋覆其面當繫鬘時隨應法儀即阿闍梨為作是言汝今受是祕密心明此即勇猛大力世尊本來無性之法得阿闍梨真實加持而能善作一切事業此即世尊大毗盧遮那如來所説乃至諸佛及執金剛等所共攝受授是言已除其繒帛誦此大明曰唵引嚩日囉二合薩埵莎煬帝引禰野二合一句作芻訥伽二合引吒那怛咄鉢二合囉二嗢訥伽二合引吒野底薩哩嚩二合引芻引三嚩日囉二合作芻囉努多囕四係引嚩日囉二合鉢舍五爾時金剛手菩薩摩訶薩復於世尊大毗盧遮那如來右月曼拏羅中依止住已説是伽陀伸讚歎曰快哉一切正覺尊三摩地智無有上所有一切諸衆生由斯二法得成佛金剛手菩薩摩訶薩作是讚已復白佛言世尊最初開目行相云何爾時世尊大毗盧遮那如來告金剛手菩薩摩訶薩言金剛手最初開目者謂於自身大曼拏羅如次觀視當其觀是曼拏羅時即得一切如來威力加持於金剛薩埵心中如理而住亦復得見種種光明勝曼拏羅又復得覩廣大神通變化事等由得如來所加持故乃能見彼金剛手身或復得見諸如來身爾時會中無動菩薩摩訶薩前詣世尊大毗盧遮那根本無性如來右旋繞已作是白言世尊云何是大曼拏羅我於是中復云何行爾時世尊大毗盧遮那如來告無動菩薩摩訶薩言大曼拏羅者所謂即觀自身曼拏羅如是觀已即取金剛加持清淨香水而為灌頂誦是心明曰嚩日囉二合引毗詵左一句然後結繫鬘印戴諸佛冠灌自心頂繫鬘印者先以二大指盤結於掌心然後屈中指與大指面合成印此是如來部印餘四部印亦然同用其五部大明次第如是大明曰唵引嚩日囉二合馱引怛尾二合引説哩吽引嚩日哩二合尼一句唵引嚩日囉二合嚩日哩二合尼吽引一句唵引囉怛那二合嚩日哩二合尼吽引一句唵引鉢訥摩二合嚩日哩二合尼吽引一句唵引迦哩摩二合嚩日哩二合尼吽引一句如前所説作灌頂已不改前印以二頭指旋轉二度作縈繞相即成四種繫鬘之印於頂額喉及彼頂後四處繫鬘次至兩耳還從頂後旋轉於前徐徐而下即解其印如和合音聲教中法儀堅固而作又彼和合音聲教中説云次當阿闍梨執金剛杵依法安住已乃為弟子發誓誡言汝今得受此一切佛如來勝祕密法中金剛灌頂已授汝金剛杵善作諸成就而彼諸如來由此得成佛復授大明曰唵引嚩日囉二合引提鉢底埵引一句末毗詵左引彌二底瑟姹二合嚩日囉二合三摩邪薩怛鑁三合三爾時金剛手菩薩摩訶薩復於世尊大毗盧遮那如來右月曼拏羅中依止住已作是白言世尊云何是自金剛杵爾時世尊大毗盧遮那如來告金剛手菩薩摩訶薩言金剛手自金剛杵者即是如來金剛杵十二指量五股而作善妙之相無其光焰金等所成其金剛薩埵金剛杵者不定分量五股而作有其威猛熾盛光焰鉢訥摩囉誐等諸寶所成其金剛王等大執金剛者及金剛忿怒金剛藥叉等如是諸杵皆十二指量三分亭等五股而作鋭利之相此等杵相如大乘現證三昧教中及降三世教中廣説此中略指瑜伽行者知杵相已然後乃名已受金剛大灌頂者復次大明曰唵引嚩日囉二合薩埵末毗詵左引彌引一句嚩日囉二合那引莫毗施引迦多二呬引嚩日囉二合那引莫三拽寫拽他引那引莫帝引那四怛吐引佐引囉曳咩五受灌頂已然可得受諸佛成就大金剛杵復次頌曰汝常持此金剛杵即金剛手堅固戒金剛薩埵勝修中一切由斯得成佛復次大明曰唵引薩哩嚩二合怛他引誐多悉提一句嚩日囉二合三摩曳引底瑟姹二合二伊沙埵引馱引囉夜引彌嚩日囉二合薩埵三呬呬呬呬吽引四然後從普賢心安布大印三昧隨説如是心大明曰摩賀引三摩邪薩埵三摩邪薩怛鑁三合一句摩賀引三摩邪薩都引㰠二摩賀引三摩邪薩埵引提底瑟姹二合莎𤚥引三如是印明執金剛等諸菩薩衆皆悉於彼諸印真實大三昧中同一成就復次身語心金剛所成心大明曰唵引嚩日囉二合薩埵三摩邪末努播引羅邪一句嚩日囉二合薩埵堆引奴引鉢底瑟姹二合二捺哩二合除引彌引婆嚩三蘇覩引沙踰二合引彌引婆嚩四阿努囉訖覩二合引彌引婆嚩五蘇布引沙踰二合引彌引婆嚩六薩哩嚩二合悉提孕二合彌引鉢囉二合野蹉七薩哩嚩二合葛哩摩二合引蘇左彌引唧多室利二合引煬酤嚕吽八訶訶訶訶呼引九婆誐鑁薩哩嚩二合怛他引誐多十嚩日囉二合摩引彌引捫左嚩日哩二合引婆嚩十一摩賀引三摩邪薩埵阿引十二如是身語心金剛所成心明章句若誦一遍即得自身語心金剛三業一切密印堅固成就所有本尊等諸法用於三部中或復二部當得成就於現生中即得成佛或成金剛手尊
